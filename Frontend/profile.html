<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile | VENYORA</title>

<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f7f7f7;
  margin: 0;
}

.profile-container {
  max-width: 900px;
  margin: 3rem auto;
  padding: 0 1rem;
}

.profile-card {
  background: #fff;
  padding: 2rem;
  border-radius: 14px;
  box-shadow: 0 6px 25px rgba(0,0,0,0.05);
  margin-bottom: 2rem;
}

.profile-card h2 {
  margin-bottom: 1.5rem;
}

.profile-card p {
  margin: 0.6rem 0;
}

input {
  width: 100%;
  padding: 0.7rem;
  margin-bottom: 1rem;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.btn {
  padding: 0.6rem 1.2rem;
  border: none;
  border-radius: 8px;
  background: #111;
  color: #fff;
  cursor: pointer;
  margin-right: 10px;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.85;
}

.edit-btn {
  background: #e53935;
}

.order-card {
  border: 1px solid #eee;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fff;
  padding: 2rem;
  border-radius: 12px;
  width: 400px;
}

.default-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 15px;
}

.default-checkbox input {
  width: 16px;
  height: 16px;
  cursor: pointer;
  margin: 0;
}

.default-checkbox label {
  cursor: pointer;
  font-weight: 500;
  margin: 0;
  line-height: 1;
}

.default-icon {
  background: #111;
  color: #fff;
  font-size: 12px;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

</style>
</head>

<body>

<nav>
  <div class="nav__header">
    <div class="nav__logo">
      <a href="index.html">VENYORA</a>
    </div>
  </div>
</nav>

<div class="profile-container">

  <!-- PROFILE SECTION -->
  <section id="profile-section">
    <div class="profile-card">

      <h2>Profile Details</h2>

      <div id="profile-view">
        <p><strong>Name:</strong> <span id="profile-name"></span></p>
        <p><strong>Email:</strong> <span id="profile-email"></span></p>
        <p><strong>Gender:</strong> <span id="profile-gender"></span></p>
        <p><strong>Mobile:</strong> <span id="profile-mobile"></span></p>
        <p><strong>Age:</strong> <span id="profile-age"></span></p>

        <button class="btn edit-btn" onclick="enableEdit()">
          ✏ Edit Profile
        </button>
      </div>

      <div id="profile-edit" style="display:none; margin-top:20px;">
        <input type="text" id="edit-name" placeholder="Name">
        <input type="email" id="edit-email" placeholder="Email">
        <input type="text" id="edit-gender" placeholder="Gender">
        <input type="text" id="edit-mobile" placeholder="Mobile">
        <input type="number" id="edit-age" placeholder="Age">

        <button class="btn" onclick="saveProfile()">Save</button>
        <button class="btn" style="background:#aaa;" onclick="cancelEdit()">Cancel</button>
      </div>

    </div>
  </section>

  <!-- ORDERS SECTION -->
  <section id="orders-section" style="display:none;">
    <div class="profile-card">
      <h2>My Orders</h2>
      <div id="orders-container"></div>
    </div>
  </section>

  <!-- ADDRESSES SECTION -->
<section id="addresses-section" style="display:none;">
  <div class="profile-card">
    <h2>My Addresses</h2>

    <!-- ADD ADDRESS BUTTON -->
    <button class="btn" onclick="openAddressModal()" style="margin-bottom:20px;">
      + Add New Address
    </button>

    <div id="address-container"></div>
  </div>
</section>

</div>

<script>
const token = localStorage.getItem("venyora-token");
if (!token) window.location.href = "signup.html";


function handleSectionFromHash() {
  const hash = window.location.hash.replace("#", "");

  const profileSection = document.getElementById("profile-section");
  const ordersSection = document.getElementById("orders-section");
  const addressesSection = document.getElementById("addresses-section");

  // Hide all
  profileSection.style.display = "none";
  ordersSection.style.display = "none";
  if (addressesSection) addressesSection.style.display = "none";

  if (hash === "orders") {
    ordersSection.style.display = "block";
    loadOrders();
  } 
  else if (hash.startsWith("addresses")) {
  addressesSection.style.display = "block";
  loadAddresses();

  // 🔥 Auto open modal if coming from checkout
  if (window.location.href.includes("openModal=true")) {
    setTimeout(() => {
      openAddressModal();
    }, 300);
  }
}
  else {
    profileSection.style.display = "block";
    loadProfile();
  }
}

window.addEventListener("load", handleSectionFromHash);
window.addEventListener("hashchange", handleSectionFromHash);


/* ================= LOAD PROFILE ================= */
async function loadProfile() {
  const res = await fetch("https://venyora-ecommerce.onrender.com/api/auth/user", {
    headers: { Authorization: `Bearer ${token}` }
  });

  const user = await res.json();

  document.getElementById("profile-name").textContent = user.name || "-";
  document.getElementById("profile-email").textContent = user.email || "-";
  document.getElementById("profile-gender").textContent = user.gender || "-";
  document.getElementById("profile-mobile").textContent = user.mobile || "-";
  document.getElementById("profile-age").textContent = user.age || "-";
}


/* ================= ENABLE EDIT ================= */
function enableEdit() {
  document.getElementById("profile-view").style.display = "none";
  document.getElementById("profile-edit").style.display = "block";

  document.getElementById("edit-name").value =
    document.getElementById("profile-name").textContent;

  document.getElementById("edit-email").value =
    document.getElementById("profile-email").textContent;

  document.getElementById("edit-gender").value =
    document.getElementById("profile-gender").textContent;

  document.getElementById("edit-mobile").value =
    document.getElementById("profile-mobile").textContent;

  document.getElementById("edit-age").value =
    document.getElementById("profile-age").textContent;
}

function cancelEdit() {
  document.getElementById("profile-view").style.display = "block";
  document.getElementById("profile-edit").style.display = "none";
}


/* ================= LOAD ORDERS ================= */
async function loadOrders() {
  const res = await fetch("https://venyora-ecommerce.onrender.com/api/orders/my-orders", {
    headers: { Authorization: `Bearer ${token}` }
  });

  const orders = await res.json();
  const container = document.getElementById("orders-container");

  if (!container) return;

  container.innerHTML = "";

  if (!orders.length) {
    container.innerHTML = "<p>No orders yet.</p>";
    return;
  }

  orders.forEach(order => {

    let itemsHTML = "";

    order.items.forEach(item => {
      itemsHTML += `
        <p>
          ${item.name} (Size: ${item.size}) × ${item.quantity}
          — ₹${item.price * item.quantity}
        </p>
      `;
    });

    let statusColor = "#f59e0b"; // Pending default

    if (order.status === "Confirmed") statusColor = "#3b82f6";
    if (order.status === "Shipped") statusColor = "#8b5cf6";
    if (order.status === "Delivered") statusColor = "#10b981";
    if (order.status === "Cancelled") statusColor = "#ef4444";

    container.innerHTML += `
      <div class="order-card">
        <p><strong>Order ID:</strong> ${order._id}</p>
        <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}</p>
        <p><strong>Payment:</strong> ${order.paymentMethod}</p>
        <p><strong>Total:</strong> ₹${order.totalAmount}</p>

        <p>
          <strong>Status:</strong>
          <span style="
            background:${statusColor};
            color:white;
            padding:4px 10px;
            border-radius:20px;
            font-size:12px;
            font-weight:500;
          ">
            ${order.status || "Pending"}
          </span>
        </p>

        <hr/>
        ${itemsHTML}

        ${
          order.status === "Pending" || order.status === "Confirmed"
            ? `<button class="btn" style="background:#ef4444; margin-top:10px;"
                onclick="cancelOrder('${order._id}')">
                Cancel Order
              </button>`
            : ""
        }

      </div>
    `;
  });
}


/* ================= SAVE PROFILE ================= */
async function saveProfile() {

  const body = {
    name: document.getElementById("edit-name").value,
    email: document.getElementById("edit-email").value,
    gender: document.getElementById("edit-gender").value,
    mobile: document.getElementById("edit-mobile").value,
    age: document.getElementById("edit-age").value
  };

  await fetch("https://venyora-ecommerce.onrender.com/api/auth/update-profile", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify(body)
  });

  cancelEdit();
  loadProfile();
}

/* ================= LOAD ADDRESSES ================= */
async function loadAddresses() {
  const res = await fetch("https://venyora-ecommerce.onrender.com/api/address", {
    headers: { Authorization: `Bearer ${token}` }
  });

  const addresses = await res.json();
  const container = document.getElementById("address-container");

  container.innerHTML = "";

  if (!addresses.length) {
    container.innerHTML = "<p>No addresses saved yet.</p>";
    return;
  }

addresses.forEach(addr => {

  container.innerHTML += `
    <div class="order-card" style="position:relative;">

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>${addr.fullName}</strong>

        ${addr.isDefault ? `
          <span class="default-icon">✔</span>
        ` : ""}
      </div>

      <p>${addr.houseNumber}, ${addr.area}</p>
      <p>${addr.city}, ${addr.state} - ${addr.pincode}</p>
      <p>${addr.mobile}</p>

      <div style="margin-top:12px; display:flex; gap:10px;">

        <button class="btn edit-btn"
          onclick="editAddress('${addr._id}')">
          ✏ Edit
        </button>

        <button class="btn"
          style="background:#f44336;"
          onclick="deleteAddress('${addr._id}')">
          🗑 Delete
        </button>

      </div>

    </div>
  `;
});
}

/* ================= EDIT ADDRESSES ================= */
async function editAddress(id) {

  const res = await fetch("https://venyora-ecommerce.onrender.com/api/address", {
    headers: { Authorization: `Bearer ${token}` }
  });

  const addresses = await res.json();
  const address = addresses.find(a => a._id === id);

  if (!address) return;

  document.getElementById("addressId").value = address._id; // 🔥 CRITICAL

  document.getElementById("fullName").value = address.fullName;
  document.getElementById("mobile").value = address.mobile;
  document.getElementById("houseNumber").value = address.houseNumber;
  document.getElementById("area").value = address.area;
  document.getElementById("city").value = address.city;
  document.getElementById("state").value = address.state;
  document.getElementById("pincode").value = address.pincode;
  document.getElementById("addressType").value = address.addressType;
  document.getElementById("isDefault").checked = address.isDefault;

  document.getElementById("address-modal").style.display = "flex";
}


/* ================= DELETE ADDRESSES ================= */
async function deleteAddress(id) {

  const confirmDelete = confirm("Are you sure you want to delete this address?");
  if (!confirmDelete) return;

  await fetch(`https://venyora-ecommerce.onrender.com/api/address/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  loadAddresses();
}

function openAddressModal() {

  document.getElementById("modal-title").textContent = "Add Address";
  document.getElementById("addressId").value = "";

  document.getElementById("fullName").value = "";
  document.getElementById("mobile").value = "";
  document.getElementById("houseNumber").value = "";
  document.getElementById("area").value = "";
  document.getElementById("city").value = "";
  document.getElementById("state").value = "";
  document.getElementById("pincode").value = "";
  document.getElementById("addressType").value = "Home";
  document.getElementById("isDefault").checked = false;

  document.getElementById("address-modal").style.display = "flex";
}

function closeAddressModal() {
  document.getElementById("address-modal").style.display = "none";
}

/* ================= SAVE ADDRESSES ================= */
async function saveAddress() {

  const id = document.getElementById("addressId").value;

  const body = {
    fullName: document.getElementById("fullName").value,
    mobile: document.getElementById("mobile").value,
    houseNumber: document.getElementById("houseNumber").value,
    area: document.getElementById("area").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    pincode: document.getElementById("pincode").value,
    addressType: document.getElementById("addressType").value,
    isDefault: document.getElementById("isDefault").checked
  };

  let response;

  if (id) {
    // 🔥 UPDATE
    response = await fetch(`https://venyora-ecommerce.onrender.com/api/address/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify(body)
    });
  } else {
    // 🔥 CREATE
    response = await fetch("https://venyora-ecommerce.onrender.com/api/address", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify(body)
    });
  }

  document.getElementById("addressId").value = ""; // 🔥 reset
  closeAddressModal();
  loadAddresses();
}

async function cancelOrder(orderId) {

  const confirmCancel = confirm("Are you sure you want to cancel this order?");
  if (!confirmCancel) return;

  await fetch(`https://venyora-ecommerce.onrender.com/api/orders/cancel/${orderId}`, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  loadOrders();
}


loadProfile();
</script>

<!-- ADDRESS MODAL -->
<div id="address-modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-title">Add Address</h3>

    <input type="hidden" id="addressId">

    <input type="text" id="fullName" placeholder="Full Name">
    <input type="text" id="mobile" placeholder="Mobile">
    <input type="text" id="houseNumber" placeholder="House Number">
    <input type="text" id="area" placeholder="Area">
    <input type="text" id="city" placeholder="City">
    <input type="text" id="state" placeholder="State">
    <input type="text" id="pincode" placeholder="Pincode">

    <select id="addressType">
      <option value="Home">Home</option>
      <option value="Office">Office</option>
    </select>

    <div class="default-checkbox">
      <input type="checkbox" id="isDefault">
      <label for="isDefault">Make Default</label>
    </div>

    <div style="margin-top:15px;">
      <button class="btn" onclick="saveAddress()">Save</button>
      <button class="btn" style="background:#aaa;" onclick="closeAddressModal()">Cancel</button>
    </div>
  </div>
</div>

</body>
</html>
